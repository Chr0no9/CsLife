<!DOCTYPE html>
<html>

<head>
    <title>CS Life</title>
    <link rel="stylesheet" href="./mainGame.css">
</head>

<body>

    <img id="playerAvatar" src="" alt="">

    <div class="main-game-container">
        <div id="nameDisplay">Name: ...</div>
        <div id="quarterDisplay">Quarter: ...</div>

        <button id="viewStatsBtn">View Stats</button>
        <button id="continueBtn" style="display: none;">Continue</button>

        <div id="statsDialog" class="dialog" style="display: none;">
            <div class="dialog-box">
                <h2>Your Stats</h2>

                <div class="stats-list">
                    <p id="statName">Name:</p>
                    <p id="statTrait">Trait:</p>

                    <p id="statHealth">Health:</p>
                    <p id="statHappiness">Happiness:</p>
                    <p id="statMoney">Money:</p>

                    <p id="statIntellect">Intellect:</p>
                    <p id="statCoding">Coding:</p>
                    <p id="statSocial">Social:</p>

                    <p id="statGpa">GPA:</p>
                    <p id="statRelationship">Relationship Status:</p>
                </div>

                <button id="closeStatsBtn">Close</button>
            </div>
        </div>
    </div>

    <div id="allocationModal" class="dialog">
        <div class="dialog-box">
            <h2>Plan Your Quarter</h2>

            <p id="pointsLeftDisplay">Points to allocate: 3</p>

            <div class="allocation-row">
                <span>Coding</span>
                <button class="minusBtn" data-category="coding">-</button>
                <span id="codingPoints">0</span>
                <button class="plusBtn" data-category="coding">+</button>
            </div>

            <div class="allocation-row">
                <span>Study</span>
                <button class="minusBtn" data-category="study">-</button>
                <span id="studyPoints">0</span>
                <button class="plusBtn" data-category="study">+</button>
            </div>

            <div class="allocation-row">
                <span>Social</span>
                <button class="minusBtn" data-category="social">-</button>
                <span id="socialPoints">0</span>
                <button class="plusBtn" data-category="social">+</button>
            </div>

            <div class="allocation-row">
                <span>Work</span>
                <button class="minusBtn" data-category="work">-</button>
                <span id="workPoints">0</span>
                <button class="plusBtn" data-category="work">+</button>
            </div>

            <div class="allocation-row">
                <span>Rest</span>
                <button class="minusBtn" data-category="rest">-</button>
                <span id="restPoints">0</span>
                <button class="plusBtn" data-category="rest">+</button>
            </div>

            <button id="confirmAllocationBtn">Start Quarter</button>

            <p id="allocationMessage"></p>
        </div>
    </div>

    <div id="eventModal" class="dialog" style="display: none;">
        <div class="dialog-box">
            <h2 id="eventTitle">Event Title</h2>
            <p id="eventDescription">Event description...</p>

            <div id="eventChoices"></div>
        </div>
    </div>

    <script type="module" src="./mainGame.js"></script>

</body>

</html>

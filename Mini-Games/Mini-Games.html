<!DOCTYPE html>
<html>

<head>
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>CS Life Mini-Games</title>

    <link
        rel="stylesheet"
        href="./Mini-Games.css"
    >
</head>

<body>

    <div class="mini-game-container">

        <div class="mini-game-header">
            <h1 id="miniGameCategory">
                Loading Mini-Games...
            </h1>

            <p id="gameProgress">
                Loading...
            </p>
        </div>

        <!-- Study game -->

        <div
            id="studyGame"
            class="game-section"
            style="display: none;"
        >
            <h2 id="studyTitle">
                Study Mini-Game
            </h2>

            <div class="question-box">
                <p id="studyQuestion"></p>
            </div>

            <div
                id="studyChoices"
                class="answer-grid"
            ></div>

            <p
                id="studyMessage"
                class="game-message"
            ></p>

        </div>

        <!-- Coding filler -->

        <div
            id="codingGame"
            class="game-section"
            style="display: none;"
        >
            <h2 id="codingTitle"> 
                Coding Mini-Game
            </h2>

            <div class="question-box">
                <p id="codingQuestion"></p>
            </div>

            <div
                id="codingChoices"
                class="answer-grid"
            ></div>

            <p
                id="codingMessage"
                class="game-message"
            ></p>

        </div>

        <!-- Social filler -->

        <div
            id="socialGame"
            class="game-section"
            style="display: none;"
        >
            <h2 id="socialTitle"> 
                Social Mini-Game
            </h2>

            <div class="question-box">
                <p id="socialQuestion"></p>
            </div>

            <div
                id="socialChoices"
                class="answer-grid"
            ></div>

            <p
                id="socialMessage"
                class="game-message"
            ></p>

        </div>

        <button
            id="nextMiniGameBtn"
            style="display: none;"
        >
            Continue
        </button>

    </div>

    <script
        type="module"
        src="./Mini-Games-Functionality.js"
    ></script>

</body>

</html>
